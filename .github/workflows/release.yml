name: Release

on:
  push:
    tags:
    - 'v*'

env:
  # The project (and its libuv submodule) declare cmake_minimum_required < 3.5,
  # which CMake 4.x on current runners refuses to configure without this.
  CMAKE_POLICY_VERSION_MINIMUM: "3.5"

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: install dependencies
      run: sudo apt-get update && sudo apt-get install -y libpcap-dev
    - name: make
      run: |
        mkdir build
        cd build
        cmake -DCMAKE_BUILD_TYPE=Release ..
        make -j$(nproc)
    - name: upload built files
      uses: actions/upload-artifact@v4
      with:
        name: lan-play-linux
        path: build/src/lan-play

  build-windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: make
      run: |
        mkdir build
        cd build
        cmake -A x64 ..
        cmake --build . --config Release
    - name: upload built files
      uses: actions/upload-artifact@v4
      with:
        name: lan-play-windows
        path: build/src/Release/lan-play.exe

  build-macos:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: make
      run: |
        mkdir build
        cd build
        cmake -DCMAKE_BUILD_TYPE=Release ..
        make -j$(sysctl -n hw.ncpu)
    - name: upload built files
      uses: actions/upload-artifact@v4
      with:
        name: lan-play-macos
        path: build/src/lan-play

  release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-macos]
    permissions:
      contents: write

    steps:
    - uses: actions/download-artifact@v4
      with:
        name: lan-play-linux
        path: lan-play-linux
    - uses: actions/download-artifact@v4
      with:
        name: lan-play-windows
        path: lan-play-windows
    - uses: actions/download-artifact@v4
      with:
        name: lan-play-macos
        path: lan-play-macos
    - name: rename
      run: |
        mv ./lan-play-windows/lan-play.exe ./lan-play-windows/lan-play-win64.exe
        mv ./lan-play-linux/lan-play ./lan-play-linux/lan-play-linux
        mv ./lan-play-macos/lan-play ./lan-play-macos/lan-play-macos
    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        files: "**/lan-play-*"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
